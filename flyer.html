<style>
  :root{
    --bg:#12150E; --ink:#EFF3E4; --muted:#9AA882; --accent:#E0A63C;
    --line:#242B1B; --card:#191E12; --btn:#1F2616; --grid:#1A2013;
  }
  :root[data-theme="light"]{
    --bg:#F7F8F1; --ink:#1F2415; --muted:#6E7A55; --accent:#B0771E;
    --line:#E2E6D2; --card:#FFFFFF; --btn:#EDF0E0; --grid:#EEF1E3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px}
  .wrap{max-width:680px;margin:0 auto;padding:0 22px}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;max-width:680px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
  .brandmark{width:26px;height:26px;flex:none}
  .wm{font-family:"Fraunces",serif;font-weight:600;font-size:18px;letter-spacing:.2px}
  .wm b{color:var(--accent);font-weight:600}
  .topctrl{display:flex;align-items:center;gap:8px}
  .rbtn{width:40px;height:40px;min-width:40px;padding:0;border-radius:50%;border:1px solid var(--line);
    background:var(--btn);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.15s;flex:none}
  .rbtn:hover{border-color:var(--accent)}
  .rbtn:active{transform:scale(.92)}
  .langwrap{position:relative}
  .menu{position:absolute;top:48px;right:0;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:6px;min-width:176px;display:none;box-shadow:0 12px 30px rgba(0,0,0,.28);z-index:40}
  .menu.open{display:block}
  .menu button{display:flex;gap:10px;align-items:center;width:100%;padding:8px 10px;border-radius:8px;border:none;
    background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left}
  .menu button:hover{background:var(--btn);color:var(--ink)}
  .menu button.on{color:var(--accent);font-weight:600}
  .menu .code{display:inline-block;width:26px;font-weight:700;font-size:12px}

  .hero{padding:26px 0 10px}
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:16px}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(36px,8.5vw,60px);line-height:1.04;letter-spacing:-.6px}
  .sub{margin-top:18px;font-size:clamp(15px,2.2vw,18px);color:var(--muted);max-width:52ch}
  .scene{margin:26px 0 8px;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#0E1109}
  .ctas{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}
  .primary{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#171204;
    border:none;cursor:pointer;text-decoration:none;font-family:inherit;font-weight:600;font-size:16px;
    padding:14px 26px;border-radius:999px;transition:.15s}
  .primary:hover{transform:translateY(-1px)}
  .ghost{display:inline-flex;align-items:center;gap:9px;background:transparent;color:var(--ink);
    border:1px solid var(--line);cursor:pointer;text-decoration:none;font-family:inherit;font-weight:500;font-size:16px;
    padding:14px 24px;border-radius:999px;transition:.15s}
  .ghost:hover{border-color:var(--accent);color:var(--accent)}

  .sec{margin:46px 0 10px}
  .sec h2{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(22px,4.8vw,32px);margin-bottom:6px}
  .sec .ss{color:var(--muted);font-size:15px;margin-bottom:20px}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
  .tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;position:relative}
  .tcard .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-bottom:10px;
    box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent)}
  .tcard h3{font-size:15px;font-weight:600}
  .tcard .g{font-size:13px;color:var(--muted);margin-top:3px}
  .tcard .pay{font-size:12px;color:var(--accent);margin-top:9px;font-weight:600}

  .proof{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:0 14px 14px 0;padding:20px 22px;margin-top:14px}
  .proof p{font-family:"Fraunces",serif;font-size:clamp(16px,3vw,19px);line-height:1.5}
  .proof .who{margin-top:10px;font-family:"Inter",sans-serif;font-size:13px;color:var(--muted)}

  .steps{display:grid;gap:14px}
  .step{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px 18px}
  .step .n{font-family:"Fraunces",serif;color:var(--accent);font-weight:600;font-size:20px;flex:none;width:26px}
  .step p{font-size:15px;color:var(--ink)}
  footer{padding:34px 0 56px;color:var(--muted);font-size:15px;border-top:1px solid var(--line);margin-top:44px;text-align:center}
  footer a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px;
    display:inline-block;padding:8px 4px;font-weight:500}
  footer a:hover{color:var(--accent)}

  .pulse{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.4);opacity:.8}100%{transform:scale(2.6);opacity:0}}
  .scan{animation:scan 6s linear infinite}
  @keyframes scan{0%{transform:translateX(-40px)}50%{transform:translateX(560px)}100%{transform:translateX(-40px)}}
  .flow{stroke-dasharray:4 7;animation:flow 1.6s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-22}}
  .blink{animation:blink 2.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
  @media(prefers-reduced-motion:reduce){.pulse,.scan,.flow,.blink{animation:none}.pulse{opacity:0}}
</style>
